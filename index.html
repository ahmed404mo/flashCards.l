<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبطال البيئة - بطاقات تعليمية 3D</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Three.js & GSAP (for smooth 3D animations) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f0fdfa; /* Light teal background */
            background-image: radial-gradient(#14b8a6 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            opacity: 0.95;
        }

        #canvasContainer canvas {
            display: block;
            outline: none;
        }
        
        /* Pulse for attention */
        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-gentle-pulse {
            animation: gentlePulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 font-sans text-gray-800 overflow-x-hidden">

    <!-- Header Section -->
    <header class="text-center mb-6 z-10 mt-4">
        <div class="inline-block bg-white/80 backdrop-blur-md py-2 px-6 rounded-full shadow-sm mb-3">
            <h1 class="text-3xl md:text-4xl font-extrabold text-teal-600 flex items-center justify-center gap-3">
                أبطال البيئة الصغيرين
            </h1>
        </div>
        <p class="text-lg text-gray-600 font-semibold bg-white/70 inline-block px-4 py-1 rounded-full shadow-sm">
            دوس على الكارت عشان تعرف السر!
        </p>
    </header>

    <!-- Main Flashcard Container -->
    <main class="w-full max-w-sm md:max-w-md relative z-10">
        
        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 rounded-full h-2.5 mb-4 shadow-inner">
            <div id="progressBar" class="bg-teal-500 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 16.66%"></div>
        </div>
        <div class="text-center mb-6 text-teal-700 font-bold" id="progressText">
            كارت 1 من 6
        </div>

        <!-- ThreeJS Container -->
        <div id="canvasContainer" class="w-full aspect-[3/4] relative cursor-pointer mx-auto">
            
            <!-- زر إعادة تشغيل الصوت -->
            <button onclick="replayAudio(event)" class="absolute top-6 right-6 z-20 bg-white/90 text-teal-600 w-12 h-12 rounded-full shadow-lg hover:scale-110 transition-all flex items-center justify-center border-2 border-teal-200">
                <i class="fa-solid fa-volume-high text-2xl"></i>
            </button>

            <!-- شاشة تحميل تظهر حتى يتم رسم الـ 3D -->
            <div id="loader" class="absolute inset-0 bg-white/90 rounded-3xl flex flex-col items-center justify-center z-10 shadow-xl border-4 border-teal-200">
                <i class="fa-solid fa-spinner fa-spin text-6xl text-teal-500 mb-4"></i>
                <span class="font-bold text-teal-700 text-xl">بنجهز الكروت...</span>
            </div>
        </div>

        <!-- Navigation Controls -->
        <div class="flex justify-between items-center mt-8 gap-4">
            <button onclick="prevCard()" class="bg-white text-teal-600 hover:bg-teal-50 border-2 border-teal-100 font-bold py-3 px-6 rounded-2xl shadow-md transition-all active:scale-95 flex items-center gap-2">
                <i class="fa-solid fa-arrow-right"></i>
                اللي قبله
            </button>
            
            <button onclick="nextCard()" class="bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-6 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center gap-2 animate-gentle-pulse">
                اللي بعده
                <i class="fa-solid fa-arrow-left"></i>
            </button>
        </div>
        
    </main>

    <!-- Confetti Canvas -->
    <canvas id="confettiCanvas" class="fixed inset-0 pointer-events-none z-50"></canvas>

    <script src="./script.js" >
       
    </script>
</body>
</html>
